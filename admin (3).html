<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heritage Cafeteria — Staff Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Work+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   HERITAGE CAFETERIA — Restaurant Management System
   Design language: chalkboard menu board + paper order tickets
   ============================================================ */

:root{
  /* -- Palette -- */
  --green-dark:   #11281C;   /* chalkboard base */
  --green-mid:    #1B3C28;   /* chalkboard panel */
  --green-line:   #2C5A3C;   /* chalk rule lines */
  --amber:        #E8A33D;   /* jollof / mustard accent */
  --amber-deep:   #C97E1E;
  --rust:         #C1502E;   /* pepper / alert accent */
  --paper:        #FFFDF6;   /* ticket / card paper */
  --paper-dim:    #F3ECD8;   /* chalk-cream text on green */
  --ink:          #1A1A1A;
  --ink-soft:     #5B5B52;
  --line:         #E3DCC6;

  /* -- Type -- */
  --font-display: 'Permanent Marker', cursive;
  --font-body: 'Work Sans', sans-serif;
  --font-mono: 'Space Mono', monospace;

  --radius: 10px;
  --shadow: 0 6px 20px rgba(17,40,28,0.18);
}

*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  margin:0;
  font-family:var(--font-body);
  color:var(--ink);
  background:var(--paper-dim);
  -webkit-font-smoothing:antialiased;
}
img{max-width:100%;display:block;}
a{color:inherit;text-decoration:none;}
ul{margin:0;padding:0;list-style:none;}
button{font-family:inherit;cursor:pointer;}
:focus-visible{outline:3px solid var(--amber);outline-offset:2px;}

.container{
  width:100%;
  max-width:1140px;
  margin:0 auto;
  padding:0 24px;
}

/* ---------------- NAVBAR ---------------- */
.site-header{
  background:var(--green-dark);
  border-bottom:4px solid var(--amber);
  position:sticky;
  top:0;
  z-index:50;
}
.navbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:14px 24px;
  max-width:1140px;
  margin:0 auto;
}
.brand{
  display:flex;
  align-items:center;
  gap:10px;
  color:var(--paper-dim);
}
.brand-mark{
  width:40px;height:40px;border-radius:50%;
  background:var(--amber);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);
  color:var(--green-dark);
  font-size:18px;
  flex-shrink:0;
}
.brand-text strong{
  font-family:var(--font-display);
  font-size:1.4rem;
  display:block;
  color:var(--paper-dim);
  line-height:1.1;
}
.brand-text span{
  font-size:0.7rem;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--amber);
}
.nav-links{
  position:fixed;
  top:0;right:0;
  height:100vh;
  width:280px;
  max-width:82vw;
  background:var(--green-dark);
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  padding:26px 28px 30px;
  gap:22px;
  border-left:4px solid var(--amber);
  transform:translateX(100%);
  transition:transform .3s ease;
  z-index:150;
  box-shadow:-12px 0 30px rgba(0,0,0,.35);
}
.nav-links.open{transform:translateX(0);}
.nav-links a{
  color:var(--paper-dim);
  font-size:1.05rem;
  font-weight:500;
  position:relative;
  padding:4px 0;
}
.nav-links a.active{color:var(--amber);}
.nav-links a:hover{color:var(--amber);}
.cart-pill{
  background:var(--amber);
  color:var(--green-dark);
  font-family:var(--font-mono);
  font-weight:700;
  font-size:.85rem;
  padding:6px 12px;
  border-radius:20px;
  align-self:flex-start;
}
.nav-toggle{
  display:flex;
  align-items:center;
  justify-content:center;
  background:none;
  border:2px solid var(--paper-dim);
  color:var(--paper-dim);
  width:42px;height:38px;border-radius:6px;
  font-size:1.15rem;
  flex-shrink:0;
}
.nav-toggle:hover{border-color:var(--amber);color:var(--amber);}
.nav-close{
  align-self:flex-end;
  background:none;border:none;
  color:var(--paper-dim);
  font-size:1.4rem;
  cursor:pointer;
  margin-bottom:6px;
}
.nav-close:hover{color:var(--amber);}
.nav-overlay{
  position:fixed;inset:0;
  background:rgba(8,18,12,0.55);
  opacity:0;
  pointer-events:none;
  transition:opacity .3s ease;
  z-index:140;
}
.nav-overlay.show{opacity:1;pointer-events:all;}

/* ---------------- HERO / CHALKBOARD ---------------- */
.chalkboard{
  background:
    repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 3px),
    radial-gradient(ellipse at top left, var(--green-mid), var(--green-dark) 70%);
  color:var(--paper-dim);
  padding:70px 0 60px;
  border-bottom:10px solid #5C3A21; /* wooden frame */
  position:relative;
}
.chalkboard::after{
  content:"";
  position:absolute;left:0;bottom:-10px;right:0;height:10px;
  background:repeating-linear-gradient(90deg,#6b4527 0,#6b4527 18px,#5C3A21 18px,#5C3A21 36px);
}
.hero-grid{
  display:grid;
  grid-template-columns:1.1fr .9fr;
  gap:40px;
  align-items:center;
}
.eyebrow{
  font-family:var(--font-mono);
  text-transform:uppercase;
  letter-spacing:.12em;
  font-size:.78rem;
  color:var(--amber);
  border-left:3px solid var(--amber);
  padding-left:10px;
  margin-bottom:16px;
  display:inline-block;
}
.hero h1{
  font-family:var(--font-display);
  font-size:clamp(2.2rem,5vw,3.6rem);
  line-height:1.15;
  margin:0 0 16px;
  color:var(--paper-dim);
  text-shadow:0 2px 0 rgba(0,0,0,.2);
}
.hero h1 .accent{color:var(--amber);}
.hero p.lede{
  font-size:1.08rem;
  color:#D8D2BC;
  max-width:480px;
  margin-bottom:28px;
  line-height:1.6;
}
.hero-actions{display:flex;gap:14px;flex-wrap:wrap;}
.chalk-divider{
  border:none;
  border-top:2px dashed rgba(243,236,216,0.25);
  margin:36px 0;
}

/* ---------------- BUTTONS ---------------- */
.btn{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:13px 26px;
  border-radius:6px;
  font-weight:700;
  font-size:.95rem;
  border:2px solid transparent;
  transition:transform .15s ease, box-shadow .15s ease;
}
.btn:hover{transform:translateY(-2px);}
.btn-primary{
  background:var(--amber);
  color:var(--green-dark);
  box-shadow:0 4px 0 var(--amber-deep);
}
.btn-primary:hover{box-shadow:0 6px 0 var(--amber-deep);}
.btn-outline{
  background:transparent;
  border-color:var(--paper-dim);
  color:var(--paper-dim);
}
.btn-outline:hover{background:rgba(243,236,216,0.1);}
.btn-dark{
  background:var(--green-dark);
  color:var(--paper-dim);
  border-color:var(--green-dark);
}
.btn-rust{
  background:var(--rust);
  color:var(--paper);
}
.btn-block{width:100%;justify-content:center;}
.btn-sm{padding:8px 16px;font-size:.82rem;}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}

/* ---------------- SECTION HEADERS (on light bg) ---------------- */
.section{padding:64px 0;}
.section-head{
  text-align:center;
  max-width:620px;
  margin:0 auto 42px;
}
.section-head .eyebrow{
  color:var(--rust);
  border-color:var(--rust);
}
.section-head h2{
  font-family:var(--font-display);
  font-size:clamp(1.8rem,3.4vw,2.5rem);
  color:var(--green-dark);
  margin:0 0 10px;
}
.section-head p{color:var(--ink-soft);font-size:1.02rem;line-height:1.6;}
.section-dark{background:var(--green-dark);color:var(--paper-dim);}
.section-dark .section-head h2{color:var(--paper-dim);}
.section-dark .section-head p{color:#C9C3AC;}

/* ---------------- MENU GRID / CARDS ---------------- */
.category-tabs{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:center;
  margin-bottom:36px;
}
.tab-btn{
  background:var(--paper);
  border:2px solid var(--line);
  padding:9px 18px;
  border-radius:30px;
  font-weight:600;
  font-size:.88rem;
  color:var(--green-dark);
}
.tab-btn.active{
  background:var(--green-dark);
  border-color:var(--green-dark);
  color:var(--amber);
}

.menu-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:22px;
}
.menu-card{
  background:var(--paper);
  border-radius:var(--radius);
  border:1px solid var(--line);
  overflow:hidden;
  display:flex;
  flex-direction:column;
  box-shadow:var(--shadow);
  transition:transform .18s ease;
}
.menu-card:hover{transform:translateY(-4px);}
.menu-card-art{
  height:120px;
  background:linear-gradient(135deg,var(--green-mid),var(--green-dark));
  display:flex;align-items:center;justify-content:center;
  font-size:2.4rem;
  overflow:hidden;
}
.menu-card-body{padding:18px;flex:1;display:flex;flex-direction:column;}
.menu-card-cat{
  font-family:var(--font-mono);
  font-size:.7rem;
  text-transform:uppercase;
  letter-spacing:.07em;
  color:var(--rust);
  margin-bottom:6px;
}
.menu-card h3{margin:0 0 6px;font-size:1.08rem;color:var(--ink);}
.menu-card p.desc{
  font-size:.85rem;color:var(--ink-soft);
  margin:0 0 14px;line-height:1.5;flex:1;
}
.menu-card-footer{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:auto;
}
.price{
  font-family:var(--font-mono);
  font-weight:700;
  font-size:1.05rem;
  color:var(--green-dark);
}
.badge{
  display:inline-block;
  font-family:var(--font-mono);
  font-size:.68rem;
  padding:3px 8px;
  border-radius:4px;
  text-transform:uppercase;
}
.badge-out{background:#F4DCD6;color:var(--rust);}
.badge-status{font-weight:700;}
.badge-pending{background:#FCE9C9;color:var(--amber-deep);}
.badge-preparing{background:#D9E7F7;color:#2A5C9A;}
.badge-ready{background:#DCEFE0;color:#1F7A45;}
.badge-completed{background:#E4E4E4;color:#555;}
.badge-cancelled{background:#F4DCD6;color:var(--rust);}

/* ---------------- TICKET / RECEIPT (signature element) ---------------- */
.ticket{
  background:var(--paper);
  border:1px dashed #C9C2A8;
  border-radius:4px;
  padding:22px 20px;
  font-family:var(--font-mono);
  color:var(--ink);
  position:relative;
  box-shadow:var(--shadow);
}
.ticket::before, .ticket::after{
  content:"";
  position:absolute;
  width:18px;height:18px;
  background:var(--paper-dim);
  border-radius:50%;
  left:-9px;
}
.ticket::before{top:-9px;}
.ticket::after{bottom:-9px;}
.ticket-serrated{
  background-image: radial-gradient(circle at 6px 6px, transparent 6px, var(--paper) 6.5px);
  background-size:12px 12px;
  background-position:bottom;
  background-repeat:repeat-x;
  padding-bottom:30px;
}
.ticket-head{
  text-align:center;
  border-bottom:1px dashed #C9C2A8;
  padding-bottom:14px;
  margin-bottom:14px;
}
.ticket-head .tname{
  font-family:var(--font-display);
  font-size:1.3rem;
  color:var(--green-dark);
  display:block;
}
.ticket-head small{letter-spacing:.08em;color:var(--ink-soft);}
.ticket-row{
  display:flex;justify-content:space-between;
  font-size:.85rem;margin-bottom:8px;
}
.ticket-row .name{color:var(--ink);}
.ticket-row .qty{color:var(--ink-soft);margin-left:6px;}
.ticket-total{
  border-top:1px dashed #C9C2A8;
  margin-top:10px;padding-top:12px;
  display:flex;justify-content:space-between;
  font-weight:700;font-size:1.05rem;
  color:var(--green-dark);
}
.ticket-meta{margin-top:14px;font-size:.78rem;color:var(--ink-soft);line-height:1.6;}
.ticket-empty{
  text-align:center;color:var(--ink-soft);font-family:var(--font-body);
  padding:30px 0;
}
.order-num{
  font-family:var(--font-mono);
  font-size:2rem;font-weight:700;
  color:var(--rust);
  letter-spacing:.04em;
}

/* ---------------- LAYOUT HELPERS ---------------- */
.two-col{
  display:grid;
  grid-template-columns:1.4fr .9fr;
  gap:34px;
  align-items:flex-start;
}
@media (max-width:860px){
  .two-col{grid-template-columns:1fr;}
  .hero-grid{grid-template-columns:1fr;}
}

.stat-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
  gap:18px;
  margin-bottom:36px;
}
.stat-card{
  background:var(--paper);
  border-radius:var(--radius);
  padding:20px;
  border:1px solid var(--line);
  box-shadow:var(--shadow);
}
.stat-card .num{
  font-family:var(--font-mono);
  font-size:1.9rem;font-weight:700;color:var(--green-dark);
  display:block;
}
.stat-card .label{
  font-size:.78rem;text-transform:uppercase;letter-spacing:.06em;
  color:var(--ink-soft);
}

/* ---------------- FORMS ---------------- */
.field{margin-bottom:18px;}
.field label{
  display:block;font-size:.85rem;font-weight:600;
  margin-bottom:6px;color:var(--green-dark);
}
.field input,.field select,.field textarea{
  width:100%;padding:11px 14px;
  border:1.5px solid var(--line);border-radius:6px;
  font-family:inherit;font-size:.95rem;background:var(--paper);
  color:var(--ink);
}
.field input:focus,.field select:focus,.field textarea:focus{
  border-color:var(--amber);
}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.radio-card{
  border:1.5px solid var(--line);border-radius:8px;
  padding:12px 14px;display:flex;gap:10px;align-items:flex-start;
  margin-bottom:10px;cursor:pointer;
}
.radio-card.selected{border-color:var(--amber);background:#FFFAEF;}
.card{
  background:var(--paper);border-radius:var(--radius);
  border:1px solid var(--line);padding:26px;box-shadow:var(--shadow);
}

/* ---------------- TABLE (admin) ---------------- */
.table-wrap{overflow-x:auto;background:var(--paper);border-radius:var(--radius);border:1px solid var(--line);}
table{width:100%;border-collapse:collapse;font-size:.9rem;}
th,td{padding:13px 16px;text-align:left;border-bottom:1px solid var(--line);}
th{
  background:var(--green-dark);color:var(--paper-dim);
  font-family:var(--font-mono);font-size:.74rem;text-transform:uppercase;letter-spacing:.05em;
}
tr:last-child td{border-bottom:none;}
td select{padding:6px 10px;border-radius:5px;border:1px solid var(--line);font-family:inherit;}

/* ---------------- TOAST ---------------- */
.toast{
  position:fixed;bottom:24px;right:24px;
  background:var(--green-dark);color:var(--paper-dim);
  padding:14px 20px;border-radius:8px;
  font-size:.9rem;box-shadow:var(--shadow);
  border-left:4px solid var(--amber);
  transform:translateY(120%);opacity:0;
  transition:transform .3s ease, opacity .3s ease;
  z-index:200;max-width:280px;
}
.toast.show{transform:translateY(0);opacity:1;}

/* ---------------- FOOTER ---------------- */
.site-footer{
  background:var(--green-dark);color:#C9C3AC;
  padding:40px 0 24px;margin-top:0;
}
.footer-grid{display:flex;justify-content:space-between;flex-wrap:wrap;gap:24px;}
.footer-grid h4{
  font-family:var(--font-display);color:var(--paper-dim);
  font-size:1.1rem;margin-bottom:10px;
}
.footer-grid p, .footer-grid a{font-size:.85rem;line-height:1.7;color:#C9C3AC;}
.footer-bottom{
  text-align:center;font-size:.78rem;color:#8C8870;
  border-top:1px solid rgba(255,255,255,0.08);margin-top:28px;padding-top:18px;
}

/* ---------------- LOGIN ---------------- */
.login-wrap{
  min-height:80vh;display:flex;align-items:center;justify-content:center;
  padding:40px 20px;
}
.login-card{max-width:400px;width:100%;}
.login-card .brand-mark{margin:0 auto 14px;width:54px;height:54px;font-size:22px;}
.hint-box{
  background:#FFF8E8;border:1px dashed var(--amber);border-radius:8px;
  padding:12px 14px;font-size:.8rem;color:var(--amber-deep);margin-bottom:20px;
  font-family:var(--font-mono);
}

/* ---------------- EMPTY STATE ---------------- */
.empty-state{
  text-align:center;padding:60px 20px;color:var(--ink-soft);
}
.empty-state .emoji{font-size:2.6rem;margin-bottom:14px;}

/* utility */
.mt-0{margin-top:0;}
.text-center{text-align:center;}
.flex-between{display:flex;align-items:center;justify-content:space-between;}
.muted{color:var(--ink-soft);}
.small{font-size:.82rem;}


/* ---- Real crest logo support ---- */
.brand-mark{
  background:#ffffff;
  padding:3px;
  overflow:hidden;
}
.brand-mark img{
  width:100%;
  height:100%;
  object-fit:contain;
  display:block;
}


/* ---- Always-visible cart pill in the header ---- */
.cart-pill-fixed{
  background:var(--amber);
  color:var(--green-dark);
  font-family:var(--font-mono);
  font-weight:700;
  font-size:.82rem;
  padding:9px 14px;
  border-radius:20px;
  margin-right:10px;
  white-space:nowrap;
}
.cart-pill-fixed:hover{background:var(--amber-deep);color:#fff;}
.nav-actions{display:flex;align-items:center;gap:10px;}
</style>
</head>
<body>

<header class="site-header">

/* ============================================================
   HERITAGE CAFETERIA — orders.js
   Firestore-backed order placement, live order sync, and
   atomic order-number generation. Requires firebase-config.js
   to be loaded first.
   ============================================================ */

/* ---------------- ORDER NUMBER (safe across devices) ---------------- */
function nextOrderNumberFirestore(){
  if(!db){ return Promise.reject(new Error('Firebase is not configured yet.')); }
  const counterRef = db.collection('meta').doc('orderCounter');
  return db.runTransaction(function(transaction){
    return transaction.get(counterRef).then(function(doc){
      let next = 101;
      if(doc.exists && doc.data().value){ next = doc.data().value + 1; }
      transaction.set(counterRef, { value: next });
      return next;
    });
  }).then(function(next){ return 'HC-' + next; });
}

/* ---------------- PLACE ORDER ---------------- */
function placeOrderFirestore(order){
  if(!db){ return Promise.reject(new Error('Firebase is not configured yet.')); }
  return db.collection('orders').add(order).then(function(docRef){
    order.firestoreId = docRef.id;
    return order;
  });
}

/* ---------------- LIVE ORDER FEED (for admin dashboard) ---------------- */
/* callback receives the full, up-to-date array of orders every time
   anything changes in Firestore — no manual refresh needed. */
function listenToOrders(callback){
  if(!db){
    showToast('Firebase not set up yet — admin order sync is offline. See setup notes at the top of this file.');
    callback([]);
    return function(){ /* no-op unsubscribe */ };
  }
  return db.collection('orders')
    .orderBy('createdAt', 'desc')
    .onSnapshot(function(snapshot){
      const orders = snapshot.docs.map(function(doc){
        return Object.assign({ firestoreId: doc.id }, doc.data());
      });
      callback(orders);
    }, function(error){
      console.error('Order sync error:', error);
      showToast('Could not connect to the live order feed.');
    });
}

/* ---------------- UPDATE ORDER STATUS ---------------- */
function updateOrderStatusFirestore(firestoreId, status){
  if(!db){ return Promise.reject(new Error('Firebase is not configured yet.')); }
  return db.collection('orders').doc(firestoreId).update({ status: status });
}

/* ---------------- STORAGE HELPERS ---------------- */
const MENU_VERSION = 'v3-photos-complete';
function getMenu(){
  const storedVersion = localStorage.getItem('hc_menu_version');
  let m = JSON.parse(localStorage.getItem(STORAGE_KEYS.MENU) || 'null');
  if(!m || storedVersion !== MENU_VERSION){
    m = SEED_MENU;
    localStorage.setItem(STORAGE_KEYS.MENU, JSON.stringify(m));
    localStorage.setItem('hc_menu_version', MENU_VERSION);
  }
  return m;
}
function saveMenu(menu){ localStorage.setItem(STORAGE_KEYS.MENU, JSON.stringify(menu)); }

function getCart(){ return JSON.parse(localStorage.getItem(STORAGE_KEYS.CART) || '[]'); }
function saveCart(cart){ localStorage.setItem(STORAGE_KEYS.CART, JSON.stringify(cart)); updateCartPill(); }

function getOrders(){ return JSON.parse(localStorage.getItem(STORAGE_KEYS.ORDERS) || '[]'); }
function saveOrders(orders){ localStorage.setItem(STORAGE_KEYS.ORDERS, JSON.stringify(orders)); }

function nextOrderNumber(){
  let seq = parseInt(localStorage.getItem(STORAGE_KEYS.ORDER_SEQ) || '100', 10);
  seq += 1;
  localStorage.setItem(STORAGE_KEYS.ORDER_SEQ, String(seq));
  return 'HC-' + seq;
}

function isAdminLoggedIn(){ return localStorage.getItem(STORAGE_KEYS.ADMIN) === 'true'; }
function setAdminLoggedIn(val){ localStorage.setItem(STORAGE_KEYS.ADMIN, val ? 'true' : 'false'); }

/* ---------------- CART LOGIC ---------------- */
function addToCart(itemId, qty=1){
  const menu = getMenu();
  const item = menu.find(m => m.id === itemId);
  if(!item || item.available === false) return;
  const cart = getCart();
  const existing = cart.find(c => c.id === itemId);
  if(existing){ existing.qty += qty; }
  else{ cart.push({ id:item.id, name:item.name, price:item.price, qty, emoji:item.emoji, image:item.image || null }); }
  saveCart(cart);
  showToast(item.name + ' added to cart');
}
function updateCartQty(itemId, qty){
  let cart = getCart();
  if(qty <= 0){ cart = cart.filter(c => c.id !== itemId); }
  else{ const c = cart.find(c => c.id === itemId); if(c) c.qty = qty; }
  saveCart(cart);
  renderCartPage && renderCartPage();
}
function removeFromCart(itemId){
  const cart = getCart().filter(c => c.id !== itemId);
  saveCart(cart);
  renderCartPage && renderCartPage();
}
function cartTotal(cart){ return cart.reduce((sum,c) => sum + c.price*c.qty, 0); }
function cartCount(cart){ return cart.reduce((sum,c) => sum + c.qty, 0); }

function updateCartPill(){
  const pills = document.querySelectorAll('[data-cart-pill]');
  pills.forEach(pill => { pill.textContent = 'Cart (' + cartCount(getCart()) + ')'; });
}

/* ---------------- FORMAT HELPERS ---------------- */
function formatNaira(n){ return '₦' + Number(n).toLocaleString('en-NG'); }
function formatDate(ts){
  const d = new Date(ts);
  return d.toLocaleDateString('en-NG', { day:'2-digit', month:'short', year:'numeric' }) +
         ' · ' + d.toLocaleTimeString('en-NG', { hour:'2-digit', minute:'2-digit' });
}

/* ---------------- TOAST ---------------- */
function showToast(msg){
  let t = document.querySelector('.toast');
  if(!t){
    t = document.createElement('div');
    t.className = 'toast';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  requestAnimationFrame(() => t.classList.add('show'));
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2200);
}

/* ---------------- NAV MOBILE TOGGLE ---------------- */
document.addEventListener('DOMContentLoaded', () => {
  updateCartPill();
  const toggle = document.querySelector('.nav-toggle');
  const links = document.querySelector('.nav-links');
  const overlay = document.querySelector('.nav-overlay');
  const closeBtn = document.querySelector('.nav-close');

  function openMenu(){
    if(links) links.classList.add('open');
    if(overlay) overlay.classList.add('show');
  }
  function closeMenu(){
    if(links) links.classList.remove('open');
    if(overlay) overlay.classList.remove('show');
  }
  if(toggle){
    toggle.addEventListener('click', () => {
      links.classList.contains('open') ? closeMenu() : openMenu();
    });
  }
  if(overlay){ overlay.addEventListener('click', closeMenu); }
  if(closeBtn){ closeBtn.addEventListener('click', closeMenu); }
  if(links){
    links.querySelectorAll('a').forEach(a => a.addEventListener('click', closeMenu));
  }
});

/* ============================================================

   ============================================================ */
  function switchTab(tab){
    document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.admin-panel').forEach(p => p.classList.remove('active'));
    document.getElementById('tab-'+tab).classList.add('active');
    document.getElementById('panel-'+tab).classList.add('active');
  }

  /* ---- Stats ---- */

  /* ---- Live order feed (Firestore) ---- */
  let liveOrders = [];

  function renderStats(){
    const orders = liveOrders;
    const today = new Date().toDateString();
    const todays = orders.filter(o => new Date(o.createdAt).toDateString() === today);
    const revenueToday = todays.reduce((s,o) => s + o.total, 0);
    const pending = orders.filter(o => o.status === 'Pending').length;
    const menu = getMenu();

    document.getElementById('stat-grid').innerHTML = `
      <div class="stat-card"><span class="num">${todays.length}</span><span class="label">Orders Today</span></div>
      <div class="stat-card"><span class="num">${formatNaira(revenueToday)}</span><span class="label">Revenue Today</span></div>
      <div class="stat-card"><span class="num">${pending}</span><span class="label">Pending Orders</span></div>
      <div class="stat-card"><span class="num">${menu.filter(m=>m.available).length}/${menu.length}</span><span class="label">Items Available</span></div>
    `;
  }

  /* ---- Orders ---- */
  const STATUSES = ['Pending','Preparing','Ready','Completed','Cancelled'];
  function renderOrders(){
    const orders = liveOrders;
    const tbody = document.getElementById('orders-tbody');
    if(orders.length === 0){
      tbody.innerHTML = `<tr><td colspan="7" class="text-center muted" style="padding:30px;">No orders placed yet.</td></tr>`;
      return;
    }
    tbody.innerHTML = orders.map((o, idx) => {
      const identifier = o.firestoreId ? `'${o.firestoreId}'` : idx;
      return `
      <tr>
        <td style="font-family:var(--font-mono);font-weight:700;">${o.orderNumber}</td>
        <td>${o.customerName}<br><span class="small muted">${o.regNumber}</span></td>
        <td class="small">${o.items.map(i=>i.name+' ×'+i.qty).join('<br>')}</td>
        <td style="font-family:var(--font-mono);">${formatNaira(o.total)}</td>
        <td class="small">${o.paymentMethod}</td>
        <td class="small">${o.pickupTime || '—'}</td>
        <td>
          <select onchange="updateOrderStatus(${identifier}, this.value)">
            ${STATUSES.map(s => `<option value="${s}" ${s===o.status?'selected':''}>${s}</option>`).join('')}
          </select>
        </td>
      </tr>
    `;
    }).join('');
  }
  function updateOrderStatus(identifier, status){
    if(typeof identifier === 'string' && typeof db !== 'undefined' && db){
      updateOrderStatusFirestore(identifier, status)
        .then(() => showToast('Order marked ' + status))
        .catch(err => { console.error(err); showToast('Could not update order — check connection.'); });
    } else {
      const orders = getOrders();
      const idx = Number(identifier);
      if(orders[idx]){
        orders[idx].status = status;
        saveOrders(orders);
        liveOrders = orders;
        renderOrders();
        renderStats();
        showToast('Order marked ' + status + ' (local only)');
      }
    }
  }

  /* ---- Menu Management ---- */
  function populateCategorySelect(){
    document.getElementById('f-category').innerHTML = CATEGORIES.map(c => `<option value="${c}">${c}</option>`).join('');
  }
  function renderMenuTable(){
    const menu = getMenu();
    document.getElementById('menu-tbody').innerHTML = menu.map(item => `
      <tr>
        <td>${item.emoji} ${item.name}</td>
        <td class="small">${item.category}</td>
        <td style="font-family:var(--font-mono);">${formatNaira(item.price)}</td>
        <td><span class="badge ${item.available?'badge-ready':'badge-out'}">${item.available?'Available':'Sold Out'}</span></td>
        <td>
          <button class="btn btn-sm btn-outline" style="border-color:var(--line);color:var(--ink);" onclick="editItem('${item.id}')">Edit</button>
          <button class="btn btn-sm btn-rust" onclick="deleteItem('${item.id}')">Delete</button>
        </td>
      </tr>
    `).join('');
  }
  function resetMenuForm(){
    document.getElementById('menu-form').reset();
    document.getElementById('edit-id').value = '';
    document.getElementById('form-title').textContent = 'Add New Item';
    document.getElementById('f-available').checked = true;
  }
  function editItem(id){
    const item = getMenu().find(m => m.id === id);
    if(!item) return;
    document.getElementById('edit-id').value = item.id;
    document.getElementById('f-name').value = item.name;
    document.getElementById('f-category').value = item.category;
    document.getElementById('f-price').value = item.price;
    document.getElementById('f-emoji').value = item.emoji;
    document.getElementById('f-desc').value = item.desc;
    document.getElementById('f-available').checked = item.available !== false;
    document.getElementById('form-title').textContent = 'Edit Item';
    window.scrollTo({top:document.getElementById('panel-menu').offsetTop - 100, behavior:'smooth'});
  }
  function deleteItem(id){
    if(!confirm('Delete this item from the menu?')) return;
    const menu = getMenu().filter(m => m.id !== id);
    saveMenu(menu);
    renderMenuTable();
    renderStats();
    showToast('Item deleted');
  }

function renderAdminView(){

    const id = document.getElementById('edit-id').value;
    const menu = getMenu();

      name: document.getElementById('f-name').value.trim(),
      category: document.getElementById('f-category').value,
      price: Number(document.getElementById('f-price').value),
      emoji: document.getElementById('f-emoji').value.trim() || '🍽️',
      desc: document.getElementById('f-desc').value.trim(),

      Object.assign(item, data);
      showToast('Item updated');

      data.id = 'm' + Date.now();
      menu.push(data);
      showToast('Item added to menu');

    saveMenu(menu);
    renderMenuTable();
    renderStats();
    resetMenuForm();

  populateCategorySelect();
    renderMenuTable();
    renderStats();

    if(typeof listenToOrders === 'function' && typeof db !== 'undefined' && db){
      listenToOrders(function(orders){
        liveOrders = orders;
        renderOrders();
        renderStats();
        const indicator = document.getElementById('sync-indicator');
        if(indicator){
          indicator.textContent = '🟢 Live — synced ' + new Date().toLocaleTimeString('en-NG', {hour:'2-digit', minute:'2-digit'});
        }
      });
    } else {
      liveOrders = getOrders();
      renderOrders();
      renderStats();
      const indicator = document.getElementById('sync-indicator');
      if(indicator){
        indicator.textContent = '📍 Local mode — set up Firebase (see js comments) for live cross-device sync.';
      }
    }
}

/* ============================================================
   ROUTER (admin portal: only two routes exist, login + dashboard)
   ============================================================ */
const ROUTES = {
  'admin-login': { render: renderAdminLoginView },
  'admin': { render: renderAdminView, requiresAuth: true }
};

let currentViewUnsub = null;

function refreshAuthHeader(){
  const loggedIn = isAdminLoggedIn();
  const logoutLink = document.getElementById('logout-link');
  if(logoutLink) logoutLink.style.display = loggedIn ? '' : 'none';
}

function router(){
  let route = (location.hash || (isAdminLoggedIn() ? '#admin' : '#admin-login')).replace('#', '');
  if(!ROUTES[route]) route = isAdminLoggedIn() ? 'admin' : 'admin-login';

  if(ROUTES[route].requiresAuth && !isAdminLoggedIn()){
    location.hash = '#admin-login';
    return;
  }

  if(currentViewUnsub){ currentViewUnsub(); currentViewUnsub = null; }

  ROUTES[route].render();
  refreshAuthHeader();
  window.scrollTo(0, 0);
}

window.addEventListener('hashchange', router);

document.addEventListener('DOMContentLoaded', function(){
  const logoutLink = document.getElementById('logout-link');
  if(logoutLink){
    logoutLink.addEventListener('click', function(e){
      e.preventDefault();
      setAdminLoggedIn(false);
      location.hash = '#admin-login';
    });
  }
  router();
});
